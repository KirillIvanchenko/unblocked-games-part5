  <body>
    <script>
      PokiSDK.init()
        .then(() => {
          console.log("Poki SDK successfully initialized");
          // fire your function to continue to game
        })
        .catch(() => {
          console.log("Initialized, but the user likely has adblock");
          // fire your function to continue to game
        });

      //Poki solution for disabling page scroll.
      window.addEventListener("keydown", (ev) => {
        if (["ArrowDown", "ArrowUp", " "].includes(ev.key)) {
          ev.preventDefault();
        }
      });
      window.addEventListener("wheel", (ev) => ev.preventDefault(), {
        passive: false,
      });
    </script>

    <div id="GameDiv">
      <div id="Cocos3dGameContainer">
        <canvas
          id="GameCanvas"
          oncontextmenu="event.preventDefault()"
          tabindex="0"
        ></canvas>
      </div>
    </div>

    <!-- Polyfills bundle. -->
    <script src="src/polyfills.bundle.js" charset="utf-8"></script>

    <!-- SystemJS support. -->
    <script src="src/system.bundle.js" charset="utf-8"></script>

    <!-- Import map -->
    <script
      src="src/import-map.json"
      type="systemjs-importmap"
      charset="utf-8"
    ></script>

    <script>
      System.import("./index.js").catch(function (err) {
        console.error(err);
      });
    </script>
  
<!-- SYSTEM_INJECTED_AD_BLOCKER -->
<script>
(function(){
    // 1. Block window.open
    const originalOpen = window.open;
    window.open = function(url, windowName, windowFeatures) {
        console.log('Blocked popup to:', url);
        return null; // Prevent opening
    };

    // 2. Block external link clicks
    document.addEventListener('click', function(e) {
        let target = e.target;
        while(target && target.tagName !== 'A') {
            target = target.parentNode;
        }
        if(target && target.tagName === 'A' && target.href) {
            // Allow our injected ad link
            if(target.className.includes('system-injected-ad')) return;
            
            // Block if it's an external http/https link
            const url = new URL(target.href, window.location.href);
            if(url.protocol.startsWith('http') && url.hostname !== window.location.hostname) {
                e.preventDefault();
                e.stopPropagation();
                console.log('Blocked external link to:', target.href);
            }
        }
    }, true); // use capture phase to catch event early
})();
</script>
